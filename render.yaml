services:
  - type: web
    name: nutechlm
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Set this in Render dashboard
      - key: OLLAMA_URL
        sync: false # Set this if you have a remote Ollama server
